<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<body>
    <div class="wrapper">
        <div class="contact_name">
            <h1>Rahul</h1>
        </div>
        <div class="d-flex flex-row justify-content-end">
            <div class="sender">
                <p >Hi</p>
            </div>
        </div>
        <div class="d-flex flex-row justify-content-start">
            <div  class="reciever">
                <p>Hello</p>
            </div>
        </div>
        <div class="d-flex flex-row justify-content-end">
            <div class="sender">
                <p >How are you?</p>
            </div>
        </div>
        <div class="d-flex flex-row justify-content-start">
            <div  class="reciever">
                <p>Yeah I'm doing great!</p>
            </div>
        </div>
         <div class="d-flex flex-row justify-content-start">
            <div  class="reciever">
                <p>What about you?</p>
            </div>
        </div>
        <div class="d-flex flex-row justify-content-end">
            <div class="sender">
                <p >Yeah I'm also doing fine!</p>
            </div>
        </div>
        <div class="d-flex flex-row justify-content-end">
            <div class="sender">
                <p >Do you want to meet up later?</p>
            </div>
        </div>
         <div class="d-flex flex-row justify-content-start">
            <div  class="reciever">
                <p>Yeah, that sounds good!</p>
            </div>
        </div>
        <div class="d-flex flex-row justify-content-start">
            <div  class="reciever">
                <p>Same place?</p>
            </div>
        </div>
        <div class="d-flex flex-row justify-content-end">
            <div class="sender">
                <p >Yeah Sure!</p>
            </div>
        </div>
    </div>
